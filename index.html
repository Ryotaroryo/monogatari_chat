<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>物語チャット</title>
<style>
  :root{
    --bg:#141319; --bg-2:#100F15; --surface:#24222F; --surface-edge:#322F40; --field:#211F2B;
    --name:#A9A2BC; --text:#ECEAF2; --muted:#6E6A7E; --accent:#8E7CDD; --accent-dim:#463A6B; --line:#2C2A38;
    --narr:#D7D4E0; --action:#938DA6; --user-bg-1:#473A6E; --user-bg-2:#5A4B8E; --user-text:#F2EEFB;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%, #1C1A26 0%, var(--bg) 45%, var(--bg-2) 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    display:flex;justify-content:center;min-height:100dvh}
  #app{width:100%;max-width:480px;background:linear-gradient(180deg,#16151C 0%,#131218 100%);
    display:flex;flex-direction:column;min-height:100dvh;box-shadow:0 0 60px rgba(0,0,0,.5);position:relative}

  .hd{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:14px;
    background:rgba(18,17,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .hd .ic{width:26px;height:26px;display:grid;place-items:center;color:var(--name);cursor:pointer;flex:none}
  .hd .ic svg{width:20px;height:20px}
  .hd h1{flex:1;font-size:16px;font-weight:700;color:#F1EFF6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hd .sub{font-size:11px;color:var(--accent);margin-top:2px;font-weight:500}
  .hd .titlewrap{flex:1;min-width:0}
  .hd .btn{font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent-dim),var(--accent));padding:7px 14px;border-radius:18px;border:none;cursor:pointer;font-family:inherit;flex:none}
  .hd .lite{font-size:13px;color:var(--muted);padding:6px 8px;cursor:pointer}
  .hd .menu{font-size:22px;color:var(--name);cursor:pointer;flex:none;line-height:1}
  svg{display:block}

  .body{flex:1;overflow-y:auto;padding:18px 16px 40px}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:60px 20px;gap:12px}

  /* 一覧 */
  .plotcard{display:flex;gap:13px;align-items:center;background:var(--surface);border:1px solid var(--surface-edge);
    border-radius:14px;padding:12px;margin-bottom:12px;cursor:pointer}
  .thumb{width:54px;height:72px;border-radius:10px;flex:none;overflow:hidden;background:linear-gradient(160deg,#3a4a6a,#23304a);position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .ph{position:absolute;inset:0;display:grid;place-items:center;color:#8a93b5;font-size:20px;font-weight:700}
  .plotcard .info{flex:1;min-width:0}
  .plotcard .info b{font-size:15px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plotcard .info p{font-size:12px;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
  .plotcard .edit{color:var(--muted);font-size:18px;padding:4px 6px;flex:none}

  .fab{position:sticky;bottom:18px;float:right;margin-right:4px}
  .fab button{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#fff;border:none;border-radius:24px;
    padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(142,124,221,.45)}

  /* 共通フォーム */
  .sec-h{font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.04em;margin:6px 0 12px}
  .sec-h:not(:first-child){margin-top:28px}
  label.f{display:block;font-size:12.5px;color:var(--name);margin:0 0 6px 2px;font-weight:500}
  .hint{font-size:11px;color:var(--muted);margin:5px 2px 0;line-height:1.5}
  input.t,textarea.t{width:100%;background:var(--field);border:1px solid var(--surface-edge);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;line-height:1.6}
  input.t:focus,textarea.t:focus{border-color:var(--accent)}
  textarea.t{resize:vertical;min-height:80px}
  .field-wrap{margin-bottom:18px}
  .add-btn{width:100%;background:transparent;border:1.5px dashed var(--surface-edge);border-radius:12px;padding:13px;color:var(--accent);font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .add-btn:active{background:#1C1A26}
  .danger{color:#E08A8A;border-color:#5a3030}

  .tabs{position:sticky;top:57px;z-index:15;display:flex;background:rgba(18,17,23,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;padding:13px 16px;font-size:13.5px;color:var(--muted);font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer}
  .tab.on{color:#fff;border-bottom-color:var(--accent)}
  .pane{display:none}.pane.on{display:block}

  .cover-slot{width:132px;height:180px;border-radius:14px;border:1.5px dashed var(--surface-edge);background:var(--field);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);overflow:hidden;position:relative;cursor:pointer}
  .cover-slot.filled{border:none}
  .cover-slot svg{width:26px;height:26px}.cover-slot small{font-size:11px}
  .cover-slot .edit{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;text-align:center;padding:5px}

  .imgstrip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .imgstrip::-webkit-scrollbar{display:none}
  .pic{position:relative;width:78px;height:104px;border-radius:11px;overflow:hidden;flex:none;background:#2a2838;cursor:pointer}
  .pic img{width:100%;height:100%;object-fit:cover}
  .pic .badge{position:absolute;top:5px;left:5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;z-index:2}
  .pic .setmain{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#cfc6ee;font-size:9.5px;text-align:center;padding:3px;cursor:pointer;z-index:2}
  .pic .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;z-index:2}
  .pic.add{border:1.5px dashed var(--surface-edge);display:grid;place-items:center;color:var(--accent);font-size:24px;background:var(--field)}

  .ccard{background:var(--surface);border:1px solid var(--surface-edge);border-radius:14px;padding:14px;margin-bottom:14px}
  .ccard .cname{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
  .ccard .cname input{flex:1;font-weight:700;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;font-family:inherit}
  .ccard .cdel{color:var(--muted);font-size:16px;cursor:pointer;flex:none}

  .seg{display:flex;gap:7px;flex-wrap:wrap}.block{margin-bottom:20px}
  .chip{padding:8px 14px;border-radius:10px;background:var(--field);border:1px solid var(--surface-edge);color:var(--name);font-size:13px;cursor:pointer;font-family:inherit}
  .chip.on{background:var(--accent-dim);border-color:var(--accent);color:#fff;font-weight:600}
  .row-tg{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
  .row-tg .lab{font-size:13.5px}.row-tg .lab small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .toggle{width:42px;height:24px;border-radius:14px;background:var(--field);border:1px solid var(--surface-edge);position:relative;cursor:pointer;flex:none}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:.2s}
  .toggle.on{background:var(--accent-dim);border-color:var(--accent)}.toggle.on::after{left:21px;background:#fff}

  .lb{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--surface-edge);border-radius:12px;padding:13px 14px;margin-bottom:10px;gap:10px}
  .lb .info{min-width:0}.lb .info b{font-size:14px}.lb .info p{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .link-btn{font-size:12px;font-weight:600;border-radius:16px;padding:6px 13px;cursor:pointer;border:1px solid var(--accent);color:var(--accent);background:transparent;flex:none}
  .link-btn.linked{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff}

  /* イントロ作成 */
  .iblock{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--surface-edge);border-radius:12px;padding:11px 12px;margin-bottom:10px}
  .iblock .rp{flex:none;font-size:10.5px;font-weight:700;border-radius:7px;padding:5px 8px;min-width:64px;text-align:center}
  .rp-narr{background:#23222C;color:var(--name);border:1px solid var(--line)}
  .rp-char{background:#2A2233;color:#D9A7C9;border:1px solid #4A3550}
  .rp-user{background:var(--accent-dim);color:#fff}
  .iblock .itx{flex:1;font-size:13px;line-height:1.7;white-space:pre-wrap;min-width:0;word-break:break-word}
  .iblock .iact span{color:var(--muted);font-size:14px;cursor:pointer;margin-left:6px}
  .var{color:var(--accent);font-weight:700}
  .composer{position:sticky;bottom:0;background:rgba(16,15,21,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);margin:14px -16px -40px;padding:10px 14px calc(12px + env(safe-area-inset-bottom))}
  .spk{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;margin-bottom:9px}
  .spk::-webkit-scrollbar{display:none}
  .spk .s{flex:none;font-size:12px;color:var(--muted);padding:5px 2px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
  .spk .s.on{color:#fff;border-bottom-color:var(--accent);font-weight:600}

  /* チャット */
  .stream{display:flex;flex-direction:column;gap:18px}
  .disclaimer{text-align:center;font-size:11px;color:var(--muted);margin:0 0 4px}
  .narr{color:var(--narr);font-size:14.5px;line-height:2.0;letter-spacing:.03em;padding:2px 6px 2px 16px;position:relative;text-align:justify}
  .narr::before{content:"";position:absolute;left:2px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--accent),transparent);border-radius:2px;opacity:.55}
  .char{display:flex;gap:10px;align-items:flex-start}
  .avatar{width:38px;height:38px;border-radius:50%;flex:none;overflow:hidden;background:#3A3848;display:grid;place-items:center;color:#cfc6ee;font-size:15px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.35)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .char .bd{min-width:0;max-width:80%}.char .nm{font-size:12px;color:var(--name);margin:1px 0 5px 2px;font-weight:500}
  .bubble{background:var(--surface);border:1px solid var(--surface-edge);border-radius:4px 14px 14px 14px;padding:11px 13px;font-size:14px;line-height:1.75;word-break:break-word}
  .line{display:block}.line+.line{margin-top:.7em}
  .line.act{color:var(--action);font-style:italic;font-size:13px}
  .user{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .user .nm{font-size:12px;color:var(--accent);margin-right:4px;font-weight:600}
  .user .bubble{background:linear-gradient(135deg,var(--user-bg-1),var(--user-bg-2));border:none;color:var(--user-text);border-radius:14px 4px 14px 14px;max-width:82%}
  .user .line.act{color:#CFC6EE}
  .msg-tools{display:flex;gap:8px;margin-top:4px}
  .msg-tools span{font-size:11px;color:var(--muted);cursor:pointer}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11.5px;letter-spacing:.06em;margin:2px 4px}
  .divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--line)}
  .typing{color:var(--muted);font-size:13px;padding:6px 16px}

  .chatinput{position:sticky;bottom:0;display:flex;align-items:flex-end;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:rgba(16,15,21,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);margin:0 -16px -40px}
  .chatinput .star{flex:none;width:38px;height:38px;border-radius:10px;background:#221F2C;border:1px solid var(--surface-edge);color:var(--accent);font-size:18px;display:grid;place-items:center;cursor:pointer}
  .chatinput textarea{flex:1;background:#211F2B;border:1px solid var(--surface-edge);border-radius:20px;padding:9px 14px;min-height:38px;max-height:120px;color:var(--text);font-size:14px;line-height:1.5;font-family:inherit;resize:none;outline:none}
  .chatinput textarea:focus{border-color:var(--accent)}
  .chatinput .send{flex:none;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--user-bg-2),var(--accent));border:none;color:#fff;display:grid;place-items:center;cursor:pointer}
  .chatinput .send:disabled{opacity:.5}

  /* モーダル */
  .modal{position:fixed;inset:0;background:rgba(8,8,12,.74);display:none;align-items:center;justify-content:center;z-index:50;padding:22px}
  .modal.on{display:flex}
  .sheet{width:100%;max-width:340px;background:#1B1A22;border:1px solid var(--surface-edge);border-radius:20px;padding:20px}
  .sheet h3{font-size:15px;margin-bottom:4px}.sheet .sub{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .frame-wrap{display:flex;gap:14px;align-items:center;margin-bottom:6px}
  .frame{overflow:hidden;position:relative;flex:none;background:#0E0D12;touch-action:none;cursor:grab}
  .frame.circle{width:150px;height:150px;border-radius:50%;border:2px solid var(--accent)}
  .frame.portrait{width:120px;height:160px;border-radius:10px;border:2px solid var(--accent)}
  .frame img{position:absolute;left:50%;top:50%;will-change:transform;user-select:none;-webkit-user-drag:none;max-width:none}
  .fullprev{flex:1}.fullprev .lab{font-size:10.5px;color:var(--muted);margin-bottom:5px}
  .fullprev .full{width:100%;aspect-ratio:3/4;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#0E0D12}
  .fullprev .full img{width:100%;height:100%;object-fit:contain}
  .drag-note{text-align:center;font-size:11px;color:var(--muted);margin:10px 0}
  .zoom{display:flex;align-items:center;gap:10px;margin-bottom:16px}.zoom span{font-size:12px;color:var(--muted)}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .acts{display:flex;gap:10px}
  .acts button{flex:1;padding:11px;border-radius:12px;font-size:13.5px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
  .btn-cancel{background:var(--field);color:var(--name)}.btn-apply{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#fff}

  .lentry{background:var(--surface);border:1px solid var(--surface-edge);border-radius:12px;padding:12px;margin-bottom:10px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2A2838;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:80;opacity:0;transition:.25s;pointer-events:none;border:1px solid var(--surface-edge)}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal" id="cropModal"><div class="sheet">
  <h3 id="cropTitle">表示位置を調整</h3>
  <div class="sub">元のアートは切り取らず保持します。枠に映る位置とサイズだけ決めます。</div>
  <div class="frame-wrap">
    <div class="frame circle" id="frame"></div>
    <div class="fullprev"><div class="lab">元画像（全体・保持）</div><div class="full" id="fullPrev"></div></div>
  </div>
  <div class="drag-note">枠をドラッグで位置調整</div>
  <div class="zoom"><span>－</span><input type="range" min="100" max="300" value="100" id="zoom"><span>＋</span></div>
  <div class="acts"><button class="btn-cancel" id="cropCancel">キャンセル</button><button class="btn-apply" id="cropApply">適用</button></div>
</div></div>
<input type="file" id="filePick" accept="image/*" style="display:none">
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ===================== ユーティリティ ===================== */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const now=()=>new Date().toISOString();
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const $=s=>document.querySelector(s);
const APP=$("#app");
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("on");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("on"),1800);}

/* ===================== IndexedDB ===================== */
const DB={_db:null};
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open("monogatari_chat",1);
  r.onupgradeneeded=e=>{const db=e.target.result;
    ["plots","personas","lorebooks","sessions"].forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:"id"});});
    if(!db.objectStoreNames.contains("kv"))db.createObjectStore("kv",{keyPath:"k"});
  };
  r.onsuccess=e=>{DB._db=e.target.result;res();};
  r.onerror=e=>rej(e.target.error);
});}
function tx(store,mode){return DB._db.transaction(store,mode).objectStore(store);}
function idbAll(store){return new Promise((res,rej)=>{const r=tx(store,"readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function idbPut(store,obj){return new Promise((res,rej)=>{const r=tx(store,"readwrite").put(obj);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function idbDel(store,id){return new Promise((res,rej)=>{const r=tx(store,"readwrite").delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function kvGet(k){return new Promise((res)=>{const r=tx("kv","readonly").get(k);r.onsuccess=()=>res(r.result?r.result.v:undefined);r.onerror=()=>res(undefined);});}
function kvPut(k,v){return new Promise((res,rej)=>{const r=tx("kv","readwrite").put({k,v});r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

/* ===================== 状態（メモリキャッシュ） ===================== */
const S={plots:[],personas:[],lorebooks:[],sessions:[],settings:{apiKey:"",model:"gemini-2.5-flash",temperature:0.9}};
async function loadAll(){
  S.plots=await idbAll("plots"); S.personas=await idbAll("personas");
  S.lorebooks=await idbAll("lorebooks"); S.sessions=await idbAll("sessions");
  const st=await kvGet("settings"); if(st) S.settings=Object.assign(S.settings,st);
  if(S.personas.length===0){ // 初期ペルソナ
    const p={id:uid(),name:"00",description:"",isDefault:true,avatar:null};
    S.personas.push(p); await idbPut("personas",p);
  }
}
const savePlot=p=>{p.updatedAt=now();return idbPut("plots",p);};
const savePersona=p=>idbPut("personas",p);
const saveLore=l=>idbPut("lorebooks",l);
const saveSession=s=>{s.updatedAt=now();return idbPut("sessions",s);};
const saveSettings=()=>kvPut("settings",S.settings);

/* ===================== 既定値・定数 ===================== */
function defaultStyle(){return{person:"三人称",tense:"過去形",length:"自動",expression:"基本",
  mood:["シリアス"],writingStyle:"設定しない",difficulty:"普通",pace:"自然",choiceSuggestions:false,infobox:false};}
const STYLE_OPTS={
  person:["一人称","二人称","三人称"],tense:["過去形","現在形"],length:["短い","中間","長い","自動"],
  expression:["会話多め","基本","行動多め"],
  mood:["ロマンス","癒し","シリアス","ヤンデレ","ファンタジー","アクション","ミステリー","ホラー"],
  writingStyle:["恋愛心理小説","ハードボイルド","夜想文学","温かな青春物語","王道ファンタジー","ライトノベル","心理ホラー","設定しない"],
  difficulty:["簡単","普通","難しい","極限"],pace:["速い","自然","遅い"]
};

/* ===================== 画像（非破壊フレーミング） ===================== */
function newImageRef(src){return{id:uid(),src,focalX:0.5,focalY:0.5,zoom:1};}
function framedStyle(img){ // object-fit cover + focal + zoom
  if(!img||!img.src)return "";
  const z=img.zoom||1;
  return `background-image:url('${img.src}');background-size:${z*100}%;background-position:${(img.focalX*100)||50}% ${(img.focalY*100)||50}%;background-repeat:no-repeat;`;
}
function imgEl(img,cls){ // <img> with object-position for cover slots
  if(!img||!img.src)return "";
  const z=img.zoom||1;
  return `<img class="${cls||''}" src="${img.src}" style="object-fit:cover;object-position:${(img.focalX*100)}% ${(img.focalY*100)}%;transform:scale(${z});">`;
}
function pickImage(){return new Promise(res=>{
  const fp=$("#filePick"); fp.value="";
  fp.onchange=()=>{const f=fp.files[0]; if(!f){res(null);return;}
    const r=new FileReader(); r.onload=()=>res(newImageRef(r.result)); r.readAsDataURL(f);};
  fp.click();
});}

/* 画像調整モーダル */
let cropState=null;
function openCrop(shape,label,img,onApply){
  cropState={img:Object.assign({},img),onApply};
  const frame=$("#frame"),title=$("#cropTitle"),zoom=$("#zoom");
  frame.className="frame "+(shape==="portrait"?"portrait":"circle");
  title.textContent=(label||"")+"の表示位置を調整";
  frame.innerHTML=`<img id="cropImg" src="${img.src}">`;
  $("#fullPrev").innerHTML=`<img src="${img.src}">`;
  const fw=shape==="portrait"?120:150, fh=shape==="portrait"?160:150;
  const im=$("#cropImg");
  let px=0,py=0,scale=(img.zoom||1);
  zoom.value=Math.round(scale*100);
  function apply(){im.style.transform=`translate(-50%,-50%) translate(${px}px,${py}px) scale(${scale})`;}
  im.onload=()=>{ // base size: cover the frame
    const r=im.naturalWidth/im.naturalHeight, fr=fw/fh; let bw,bh;
    if(r>fr){bh=fh;bw=fh*r;}else{bw=fw;bh=fw/r;}
    im.style.width=bw+"px";im.style.height=bh+"px";
    px=(img.focalX-0.5)*-bw; py=(img.focalY-0.5)*-bh; apply();
    cropState._calc={bw,bh};
  };
  if(im.complete)im.onload();
  zoom.oninput=()=>{scale=zoom.value/100;apply();};
  let drag=false,sx,sy;
  frame.onpointerdown=e=>{drag=true;sx=e.clientX-px;sy=e.clientY-py;frame.setPointerCapture(e.pointerId);frame.style.cursor="grabbing";};
  frame.onpointermove=e=>{if(!drag)return;px=e.clientX-sx;py=e.clientY-sy;apply();};
  frame.onpointerup=()=>{drag=false;frame.style.cursor="grab";};
  cropState._get=()=>{const c=cropState._calc||{bw:fw,bh:fh};
    return{focalX:Math.min(1,Math.max(0,0.5-px/c.bw)),focalY:Math.min(1,Math.max(0,0.5-py/c.bh)),zoom:scale};};
  $("#cropModal").classList.add("on");
}
$("#cropCancel").onclick=()=>$("#cropModal").classList.remove("on");
$("#cropApply").onclick=()=>{
  if(cropState){const g=cropState._get();const img=Object.assign(cropState.img,g);cropState.onApply&&cropState.onApply(img);}
  $("#cropModal").classList.remove("on");
};
$("#cropModal").addEventListener("click",e=>{if(e.target.id==="cropModal")$("#cropModal").classList.remove("on");});

}
function charAvatar(plot,name){
  const c=(plot.characters||[]).find(x=>x.name===name);
  if(c){const img=(c.images||[]).find(i=>i.id===c.mainImageId)||(c.images||[])[0];if(img)return `<div class="avatar">${imgEl(img)}</div>`;}
  return `<div class="avatar">${name?esc(name.slice(0,1)):'?'}</div>`;
}
function drawMessages(){
  const stream=$("#stream");const{session,plot}=CUR;const persona=S.personas.find(p=>p.id===session.personaId);
  const pname=persona?persona.name:"あなた";
  stream.innerHTML=session.messages.map(m=>{
    if(m.role==="user")return `<div class="user"><div class="nm">${esc(pname)}</div><div class="bubble">${blocksHtml(m.content)}</div>
      <div class="msg-tools"><span data-medit="${m.id}">編集</span><span data-mdel="${m.id}">削除</span></div></div>`;
    // ai: blocks
    return (m.blocks||[]).map(bk=>{
      if(bk.type==="narr")return `<div class="narr">${blocksHtml(bk.text)}</div>`;
      return `<div class="char">${charAvatar(plot,bk.name)}<div class="bd"><div class="nm">${esc(bk.name||"")}</div><div class="bubble">${blocksHtml(bk.text)}</div></div></div>`;
    }).join("")+`<div class="msg-tools" style="margin-left:48px"><span data-medit="${m.id}">編集</span><span data-mdel="${m.id}">削除</span></div>`;
  }).join("");
  stream.querySelectorAll("[data-mdel]").forEach(el=>el.onclick=()=>{if(confirm("この発言を削除しますか？")){
    session.messages=session.messages.filter(x=>x.id!==el.dataset.mdel);saveSession(session);drawMessages();}});
  stream.querySelectorAll("[data-medit]").forEach(el=>el.onclick=()=>editMessage(el.dataset.medit));
  $(".body").scrollTop=$(".body").scrollHeight;
}
function editMessage(id){
  const m=CUR.session.messages.find(x=>x.id===id);if(!m)return;
  const cur=m.role==="user"?m.content:(m.raw||(m.blocks||[]).map(b=>b.type==="narr"?`[N] ${b.text}`:`[C:${b.name}] ${b.text}`).join("\n"));
  const v=prompt("編集（AI発言は [N]…／[C:名前]… 形式）",cur);if(v==null)return;
  if(m.role==="user")m.content=v; else{m.raw=v;m.blocks=parseAI(v);}
  saveSession(CUR.session);drawMessages();
}
function switchPersona(){

  const v=prompt("分身（ペルソナ）を選択\n"+names+"\n\n番号を入力:");if(v==null)return;

/* ===================== ②プロンプト組み立て ＋ Gemini ===================== */
function selectActiveCharacters(plot,session,userInput){
  const recent=session.messages.slice(-6).map(m=>m.role==="user"?m.content:(m.raw||"")).join(" ")+" "+userInput;
  const active=plot.characters.filter(c=>c.name && recent.includes(c.name));
  return active.length?active:plot.characters; // 該当なしは全員（少人数想定）
}
function triggeredLore(plot,session,userInput){
  const scope=session.messages.slice(-2).map(m=>m.role==="user"?m.content:(m.raw||"")).join(" ")+" "+userInput;
  const out=[];
  plot.linkedLorebookIds.forEach(id=>{const lb=S.lorebooks.find(l=>l.id===id);if(!lb)return;
    (lb.entries||[]).forEach(e=>{if((e.keywords||[]).some(k=>k&&scope.includes(k)))out.push(e);});});
  return out;
}
function buildSystem(plot,session,persona,userInput){
  const st=plot.style||defaultStyle();
  const active=selectActiveCharacters(plot,session,userInput);
  const lore=triggeredLore(plot,session,userInput);
  const pname=persona?persona.name:"あなた";
  let s=`あなたは没入型の物語を進行させる小説エンジンです。設定に厳密に従い、主人公（ユーザー）の入力を受けて物語を継続してください。\n\n`;
  s+=`# 出力フォーマット（厳守）\n`;
  s+=`- 地の文は行頭に [N] を付ける。${st.person}・${st.tense}で描写。\n`;
  s+=`- キャラの発言は行頭に [C:名前] を付ける。セリフと *動作・心理* を含めてよい。\n`;
  s+=`- セリフと *地の文* は別の行に分ける。\n`;
  s+=`- 1人が話すごとに新しい [C:名前] 行を作る。タグ以外の前置き・説明は書かない。\n`;
  s+=`- ユーザー入力が行動指示（ト書き）の場合、その結果を [N] と関係者の反応として描写する。\n`;
  s+=`- 登場人物は登録キャラに限らない。物語上必要なら、ユーザーの指示や場面に応じて新しい人物（モブ・敵・通行人など）を [C:名前] で登場させてよい。\n\n`;
  s+=`# スタイル\n- 1ターンの長さ：${st.length} / 表現バランス：${st.expression}\n- 雰囲気：${(st.mood||[]).join("・")||"指定なし"} / 文体：${st.writingStyle}\n- 難易度：${st.difficulty}（キャラは性格と状況に即して自律的に行動）/ 展開速度：${st.pace}\n`;
  if(st.choiceSuggestions)s+=`- 応答の最後に、ユーザーが取れる行動の選択肢を2〜3個、箇条書きで添える。\n`;
  if(st.infobox)s+=`- 冒頭に【状況】や【心情】を1行で短く添えてよい。\n`;
  s+=`\n# 世界観・状況\n${plot.description||"（指定なし）"}\n`;
  if(plot.narratorInstruction)s+=`\n# ナレーター指示（地の文の方針）\n${plot.narratorInstruction}\n`;
  s+=`\n# 主人公（ユーザー）\n- 名前：${pname}\n${persona&&persona.description?persona.description+"\n":""}`;
  s+=`\n# 登場キャラクター\n`;
  active.forEach(c=>{s+=`## ${c.name}\n${c.profile||""}\n`;
    (plot.situationExamples||[]).filter(x=>x.characterName===c.name).forEach(x=>{s+=`口調サンプル：${x.text}\n`;});});
  if(lore.length){s+=`\n# 追加設定（言及により有効）\n`;lore.forEach(e=>{s+=`- ${e.content}\n`;});}
  return s;
}
function buildContents(session,persona,userInput){
  const pname=persona?persona.name:"あなた";
  const turns=[];
  session.messages.forEach(m=>{
    if(m.role==="user")turns.push({role:"user",text:m.content});
    else turns.push({role:"model",text:m.raw||(m.blocks||[]).map(b=>b.type==="narr"?`[N] ${b.text}`:`[C:${b.name}] ${b.text}`).join("\n")});
  });
  turns.push({role:"user",text:userInput});
  // 連続同roleをマージ（Gemini向け）
  const merged=[];turns.forEach(t=>{const last=merged[merged.length-1];if(last&&last.role===t.role)last.text+="\n"+t.text;else merged.push({role:t.role,text:t.text});});
  // 先頭はuserから始める必要 → modelで始まる場合は調整
  while(merged.length&&merged[0].role==="model")merged.shift();
  return merged.map(t=>({role:t.role,parts:[{text:t.text.replace(/\{\{user\}\}/g,pname)}]}));
}
function maxTokensByLength(len){return{"短い":300,"中間":600,"長い":1200,"自動":800}[len]||800;}
async function callGemini(system,contents,st){
  const key=S.settings.apiKey;if(!key)throw new Error("APIキーが未設定です。設定画面で入力してください。");
  const model=S.settings.model||"gemini-2.5-flash";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  const body={
    system_instruction:{parts:[{text:system}]},
    contents,
    generationConfig:{temperature:S.settings.temperature??0.9,maxOutputTokens:maxTokensByLength(st.length)},
    safetySettings:["HARM_CATEGORY_HARASSMENT","HARM_CATEGORY_HATE_SPEECH","HARM_CATEGORY_SEXUALLY_EXPLICIT","HARM_CATEGORY_DANGEROUS_CONTENT"].map(c=>({category:c,threshold:"BLOCK_NONE"}))
  };
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await r.json();
  if(!r.ok)throw new Error((data.error&&data.error.message)||("HTTP "+r.status));
  const cand=data.candidates&&data.candidates[0];
  if(!cand){const bf=data.promptFeedback&&data.promptFeedback.blockReason;throw new Error("応答が空です"+(bf?"（ブロック: "+bf+"）":""));}
  const parts=cand.content&&cand.content.parts||[];
  return parts.map(p=>p.text||"").join("");
}
function parseAI(raw){
  const blocks=[];const lines=raw.split(/\r?\n/);let cur=null;
  lines.forEach(line=>{
    const mn=line.match(/^\s*\[N\]\s?(.*)$/);
    const mc=line.match(/^\s*\[C:([^\]]+)\]\s?(.*)$/);
    if(mn){if(cur)blocks.push(cur);cur={type:"narr",text:mn[1]};}
    else if(mc){if(cur)blocks.push(cur);cur={type:"char",name:mc[1].trim(),text:mc[2]};}
    else if(cur){cur.text+=(cur.text?"\n":"")+line;}
    else if(line.trim()){cur={type:"narr",text:line};}
  });
  if(cur)blocks.push(cur);
  return blocks.length?blocks:[{type:"narr",text:raw.trim()}];
}
let sending=false;
async function sendMessage(){
  if(sending)return;
  const f=$("#cfield");const text=f.value.trim();if(!text)return;
  const{session,plot}=CUR;const persona=S.personas.find(p=>p.id===session.personaId);
  session.messages.push({id:uid(),role:"user",content:text,createdAt:now()});
  f.value="";f.style.height="auto";saveSession(session);drawMessages();
  sending=true;$("#csend").disabled=true;$("#typing").style.display="block";
  try{
    const sys=buildSystem(plot,session,persona,text);
    const contents=buildContents(session,persona,text);
    const raw=await callGemini(sys,contents,plot.style||defaultStyle());
    const blocks=parseAI(raw);
    session.messages.push({id:uid(),role:"ai",raw,blocks,createdAt:now()});
    plot.talkCount=(plot.talkCount||0)+1;savePlot(plot);
    saveSession(session);drawMessages();
  }catch(err){
    session.messages.push({id:uid(),role:"ai",raw:"",blocks:[{type:"narr",text:"⚠ "+err.message}],createdAt:now()});
    drawMessages();
  }finally{sending=false;$("#csend").disabled=false;$("#typing").style.display="none";}
}

function drawPersonas(){
  $("#personaList").innerHTML=S.personas.map(p=>`
    <div class="ccard"><div class="cname"><input value="${esc(p.name)}" data-pn="${p.id}"><span class="cdel" data-pdel="${p.id}">🗑</span></div>
      <label class="f">設定（見た目・立場など。指示文は不要）</label>

      <div class="row-tg" style="border:none;padding-top:10px"><div class="lab">新しい会話で既定にする</div><div class="toggle ${p.isDefault?'on':''}" data-pdef="${p.id}"></div></div>
    </div>`).join("");
  const L=$("#personaList");
  L.querySelectorAll("[data-pn]").forEach(el=>el.oninput=e=>{find("personas",el.dataset.pn).name=e.target.value;savePersona(find("personas",el.dataset.pn));});
  L.querySelectorAll("[data-pd]").forEach(el=>el.oninput=e=>{find("personas",el.dataset.pd).description=e.target.value;savePersona(find("personas",el.dataset.pd));});
  L.querySelectorAll("[data-pdel]").forEach(el=>el.onclick=()=>{if(S.personas.length<=1){toast("最低1つは必要です");return;}
    if(confirm("削除しますか？")){S.personas=S.personas.filter(x=>x.id!==el.dataset.pdel);idbDel("personas",el.dataset.pdel);drawPersonas();}});
  L.querySelectorAll("[data-pdef]").forEach(el=>el.onclick=()=>{S.personas.forEach(p=>{p.isDefault=(p.id===el.dataset.pdef);savePersona(p);});drawPersonas();});
}
function drawLore(){
  $("#loreList").innerHTML=S.lorebooks.map(l=>`
    <div class="ccard"><div class="cname"><input value="${esc(l.title)}" data-ln="${l.id}"><span class="cdel" data-ldel="${l.id}">🗑</span></div>
      <input class="t" style="margin-bottom:10px" placeholder="簡単な説明（管理用・AIに渡らない）" value="${esc(l.description)}" data-ld="${l.id}">
      <div data-entries="${l.id}">${(l.entries||[]).map((e,ei)=>`
        <div class="lentry">
          <input class="t" style="margin-bottom:8px" placeholder="キーワード（コンマ区切り）" value="${esc((e.keywords||[]).join(","))}" data-ek="${l.id}|${ei}">
          <textarea class="t" placeholder="このキーワードが出たらAIに渡す内容" data-ec="${l.id}|${ei}">${esc(e.content)}</textarea>
          <div style="text-align:right;margin-top:6px"><span class="cdel" data-edel="${l.id}|${ei}" style="font-size:13px;color:var(--muted);cursor:pointer">項目を削除</span></div>
        </div>`).join("")}</div>
      <button class="add-btn" data-eadd="${l.id}" style="padding:9px">＋ 項目を追加</button>
    </div>`).join("");
  const L=$("#loreList");
  L.querySelectorAll("[data-ln]").forEach(el=>el.oninput=e=>{const l=find("lorebooks",el.dataset.ln);l.title=e.target.value;saveLore(l);});
  L.querySelectorAll("[data-ld]").forEach(el=>el.oninput=e=>{const l=find("lorebooks",el.dataset.ld);l.description=e.target.value;saveLore(l);});
  L.querySelectorAll("[data-ldel]").forEach(el=>el.onclick=()=>{if(confirm("設定集を削除しますか？")){S.lorebooks=S.lorebooks.filter(x=>x.id!==el.dataset.ldel);idbDel("lorebooks",el.dataset.ldel);
    S.plots.forEach(p=>{p.linkedLorebookIds=(p.linkedLorebookIds||[]).filter(id=>id!==el.dataset.ldel);savePlot(p);});drawLore();}});
  L.querySelectorAll("[data-ek]").forEach(el=>el.oninput=e=>{const[id,ei]=el.dataset.ek.split("|");const l=find("lorebooks",id);
    l.entries[+ei].keywords=e.target.value.split(",").map(s=>s.trim()).filter(Boolean);saveLore(l);});
  L.querySelectorAll("[data-ec]").forEach(el=>el.oninput=e=>{const[id,ei]=el.dataset.ec.split("|");const l=find("lorebooks",id);l.entries[+ei].content=e.target.value;saveLore(l);});
  L.querySelectorAll("[data-eadd]").forEach(el=>el.onclick=()=>{const l=find("lorebooks",el.dataset.eadd);l.entries.push({id:uid(),title:"",keywords:[],content:""});saveLore(l);drawLore();});
  L.querySelectorAll("[data-edel]").forEach(el=>el.onclick=()=>{const[id,ei]=el.dataset.edel.split("|");const l=find("lorebooks",id);l.entries.splice(+ei,1);saveLore(l);drawLore();});
}
function find(store,id){return S[store].find(x=>x.id===id);}

      <div class="sec-h">データ</div>

function exportData(){
  const dump={plots:S.plots,personas:S.personas,lorebooks:S.lorebooks,sessions:S.sessions,settings:{model:S.settings.model,temperature:S.settings.temperature}};
  const blob=new Blob([JSON.stringify(dump)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="monogatari_backup_"+Date.now()+".json";a.click();
  toast("書き出しました");
}
function importData(){
  const fp=$("#filePick");fp.value="";fp.accept="application/json";
  fp.onchange=()=>{const f=fp.files[0];if(!f){fp.accept="image/*";return;}
    const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);
      for(const s of ["plots","personas","lorebooks","sessions"]){if(d[s]){for(const o of d[s]){await idbPut(s,o);}}}
      if(d.settings){S.settings=Object.assign(S.settings,d.settings);await saveSettings();}
      await loadAll();toast("読み込みました");go("home");
    }catch(e){toast("読み込みに失敗しました");}finally{fp.accept="image/*";}};
    r.readAsText(f);};
  fp.click();
}
async function wipeAll(){
  for(const s of ["plots","personas","lorebooks","sessions"]){const all=await idbAll(s);for(const o of all)await idbDel(s,o.id);}
  await loadAll();toast("削除しました");go("home");
}

(async function(){
  try{await openDB();await loadAll();}catch(e){APP.innerHTML='<div class="center">起動に失敗しました：'+esc(e.message)+'</div>';return;}
  render();
})();
